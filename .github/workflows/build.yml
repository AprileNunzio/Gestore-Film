name: Build and Release Windows Executable

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller packaging requests
        
    - name: Read Version
      id: get_version
      shell: pwsh
      run: |
        if (Test-Path VERSION) {
          $VER = Get-Content VERSION
          echo "VERSION=$VER" >> $env:GITHUB_ENV
        } else {
          echo "VERSION=Unknown" >> $env:GITHUB_ENV
        }

    - name: Build Executable with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "Gestore_Film_Portable" --add-data "VERSION;." --add-data "resources;resources" main.py

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          dist/Gestore_Film_Portable.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
